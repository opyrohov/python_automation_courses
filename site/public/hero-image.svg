<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5d6eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d6eff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Code brackets -->
  <path d="M80 140 L40 200 L80 260" stroke="url(#grad1)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M320 140 L360 200 L320 260" stroke="url(#grad2)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Checkmark in center -->
  <circle cx="200" cy="200" r="70" stroke="url(#grad1)" stroke-width="8" fill="none"/>
  <path d="M165 200 L190 225 L240 175" stroke="url(#grad2)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Decorative dots -->
  <circle cx="120" cy="100" r="8" fill="#5d6eff" opacity="0.6"/>
  <circle cx="280" cy="100" r="8" fill="#a855f7" opacity="0.6"/>
  <circle cx="120" cy="300" r="8" fill="#a855f7" opacity="0.6"/>
  <circle cx="280" cy="300" r="8" fill="#5d6eff" opacity="0.6"/>

  <!-- Python-like snake hint -->
  <path d="M140 320 Q200 350 260 320" stroke="url(#grad1)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>